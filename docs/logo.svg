  <path d="M20 50 H 10" stroke="#11211f" stroke-width="4" stroke-linecap="round" />
  
  <!-- Connection Nodes -->
  <circle cx="50" cy="10" r="4" fill="#7dc8ff" />
  <circle cx="90" cy="50" r="4" fill="#ffd277" />
  <circle cx="50" cy="90" r="4" fill="#bdf4e3" />
  <circle cx="10" cy="50" r="4" fill="#ff8f6a" />
  
  <!-- Inner Detail -->
